services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:80"

volumes:
  redis_data:
