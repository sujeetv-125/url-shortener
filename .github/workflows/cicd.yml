name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  API_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-api
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-frontend

jobs:

  build-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "sha=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.API_IMAGE }}:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.API_IMAGE }}:latest
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  update-gitops:
    name: Update GitOps Repo
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - uses: actions/checkout@v4
        with:
          repository: sujeetv-125/url-shortener-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tags in values.yaml
        run: |
          cd gitops
          TAG=${{ needs.build-push.outputs.tag }}
          sed -i "s/tag: .*/tag: $TAG/" helm/url-shortener/values.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add helm/url-shortener/values.yaml
          git commit -m "ci: deploy image $TAG"
          git push
